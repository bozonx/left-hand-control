layers:
  - id: nav
    keys:
      AltLeft: macro:pasteAtLineBottom
      MetaLeft: Ctrl+KeyX
      Space: Delete
      KeyQ: macro:moveLineDown
      KeyW: Ctrl+Backspace
      KeyE: Ctrl+Delete
      KeyR: PageUp
      KeyT: Ctrl+Home
      KeyY: Home
      KeyU: macro:downEnd
      KeyI: macro:upEnd
      KeyO: End
      KeyP: macro:up5Times
      KeyS: macro:duplicateLine
      KeyD: Ctrl+KeyD
      KeyF: PageDown
      KeyG: Ctrl+End
      KeyH: ArrowLeft
      KeyJ: ArrowDown
      KeyK: ArrowUp
      KeyL: ArrowRight
      Semicolon: macro:rightSpace
      KeyZ: macro:emptyLineBelow
      KeyX: macro:cutWordRightCenter
      KeyC: macro:copyWordAfterCenter
      KeyV: macro:pasteAtLineAbove
      KeyB: macro:replaceWordWidthBuffer
      KeyN: Ctrl+ArrowLeft
      KeyM: macro:downHome
      Comma: macro:upHome
      Period: Ctrl+ArrowRight
      Slash: macro:down5Times
    extras:
      - name: Mouse4
        action: BrowserBack
      - name: Mouse5
        action: BrowserForward
  - id: sel
    keys:
      AltLeft: Ctrl+Enter
      Space: Backspace
      KeyQ: Ctrl+KeyZ
      KeyW: macro:cutToStart
      KeyE: macro:cutToEnd
      KeyR: macro:cutLineContent
      KeyT: macro:cutAndRemoveLine
      KeyY: Shift+Home
      KeyO: Shift+End
      KeyP: macro:select5LinesUp
      KeyA: Ctrl+Slash
      KeyS: macro:copyToStart
      KeyD: macro:copyToEnd
      KeyF: macro:copyLine
      KeyH: Shift+ArrowLeft
      KeyJ: Shift+ArrowDown
      KeyK: Shift+ArrowUp
      KeyL: Shift+ArrowRight
      Semicolon: macro:selectWholeLine
      KeyX: macro:replaceToStartWithBuffer
      KeyC: macro:replaceToEndWithBuffer
      KeyB: macro:replaceLineWidthBuffer
      KeyN: Ctrl+Shift+ArrowLeft
      Period: Ctrl+Shift+ArrowRight
      Slash: macro:select5LinesDown
  - id: sym
    keys:
      KeyQ: "text:<"
      KeyW: "text:{"
      KeyE: "text:["
      KeyR: "text:("
      KeyT: "text:|"
      KeyY: "text:^"
      KeyU: Digit7
      KeyI: Digit8
      KeyO: Digit9
      KeyP: "text:="
      BracketLeft: "text:≠"
      KeyA: "text:$"
      KeyS: "text:#"
      KeyD: "text:!"
      KeyF: "text:?"
      KeyG: "text:&"
      KeyH: "text:*"
      KeyJ: Digit4
      KeyK: Digit5
      KeyL: Digit6
      Semicolon: "text:+"
      Quote: "text:%"
      KeyZ: "text::"
      KeyX: "text:`"
      KeyC: "text:'"
      KeyV: 'text:"'
      KeyB: "text:/"
      KeyN: Digit0
      KeyM: Digit1
      Comma: Digit2
      Period: Digit3
      Slash: "text:@"
      ShiftRight: "text:_"
  - id: fkeys
    keys:
      KeyQ: "text:>"
      KeyW: "text:}"
      KeyE: "text:]"
      KeyR: "text:)"
      KeyU: F7
      KeyI: F8
      KeyO: F9
      KeyP: F12
      BracketLeft: "text:ℹ️"
      KeyA: "text:€"
      KeyS: "text:№"
      KeyD: "text:‼️"
      KeyF: "text:❓"
      KeyG: "text:❌"
      KeyJ: F4
      KeyK: F5
      KeyL: F6
      Semicolon: F11
      Quote: "text:☝️"
      KeyZ: "text:;"
      KeyX: "text:~"
      KeyC: "text:⏩"
      KeyV: "text:✅"
      KeyB: "text:\\"
      KeyM: F1
      Comma: F2
      Period: F3
      Slash: F10
  - id: win
    keys:
      Tab: Tab
      CapsLock: sys:walkThroughWindowsAlternative
      ShiftLeft: sys:walkThroughWindowsCurrentApp
      Digit1: sys:taskEntry1
      Digit2: sys:taskEntry2
      Digit3: sys:taskEntry3
      Digit4: sys:taskEntry4
      Digit5: sys:taskEntry5
      Digit6: sys:taskEntry6
      Digit7: sys:taskEntry7
      Digit8: sys:taskEntry8
      Digit9: sys:taskEntry9
      Digit0: sys:taskEntry10
      KeyW: Ctrl+KeyA
      KeyT: sys:windowKeepAbove
      Backslash: sys:screenOff
      KeyA: sys:switchDesktop4
      KeyS: sys:switchDesktop3
      KeyD: sys:switchDesktop2
      KeyF: sys:switchDesktop1
      KeyG: sys:windowToNextDesktop
      KeyZ: sys:windowMaximizeVertical
      KeyX: sys:windowMaximizeHorizontal
      KeyC: sys:screenshot
      KeyV: sys:showClipboardHistory
      KeyB: sys:windowClose
      KeyN: sys:brightnessDown
      KeyM: sys:brightnessUp
      Comma: sys:volumeDown
      Period: sys:volumeUp
      Slash: sys:muteAudio
  - id: space
    keys:
      Tab: sys:switchLayout1
      CapsLock: sys:switchLayout2
      ShiftLeft: sys:switchLayout3
      ShiftRight: sys:switchLayout4
      Enter: sys:switchLayout5
      Backslash: sys:switchLayout6
rules:
  - key: Tab
    layer: sel
  - key: CapsLock
    tap: Ctrl+KeyV
    layer: nav
    holdMs: 180
  - key: ShiftLeft
    tap: Ctrl+KeyC
  - key: ControlLeft
    hold: AltLeft
  - key: MetaLeft
    tap: Escape
    hold: ControlLeft
  - key: AltLeft
    tap: Enter
    layer: win
    hold: AltLeft
  - key: Space
    layer: space
  - key: AltRight
    tap: "text:."
    layer: sym
  - key: ControlRight
    tap: "text:,"
    layer: fkeys
  - key: ShiftRight
    tap: "text:-"
macros: []
