# Ivan K's Left Hand Control — встроенная раскладка.
#
# Этот YAML описывает ПРЕСЕТ раскладки (layers + rules + keymaps + macros).
# Глобальные настройки приложения (таймауты, автозапуск, устройство ввода)
# в пресетах НЕ хранятся — они лежат в config.json и общие для всех
# раскладок. Формат файла одинаков для встроенной раскладки и для
# пользовательских файлов в <configDir>/layouts/*.yaml.
#
# -----------------------------------------------------------------------------
# СТРУКТУРА
# -----------------------------------------------------------------------------
#
# name:         человекочитаемое имя пресета (обязательно).
# description:  описание пресета (опционально).
#
# layers:
#   Список пользовательских слоёв. Базовый слой "base" всегда существует
#   и добавляется автоматически, описывать его здесь не нужно.
#   - id:   уникальный идентификатор (латиница, без пробелов).
#     name: человекочитаемое имя, которое будет показано в UI.
#
# rules:
#   Правила для клавиш с двумя режимами (tap / hold) — слой, модификатор,
#   переопределённое действие одиночного нажатия и т.п.
#
#   - key:    код физической клавиши (см. список ниже).
#
#     layer:  id слоя, активируемого при удержании. Опционально.
#             Пусто / отсутствует = слой не активируется; режим удержания
#             определяется полем `hold` (см. ниже).
#
#     tap:    что делает короткое нажатие. Три варианта:
#               поле отсутствует  -> native: эмитим саму физическую клавишу
#                                    (Tab->Tab, CapsLock->CapsLock и т.п.)
#               tap: ~  (null)    -> swallow: ничего не происходит
#               tap: <действие>   -> своё действие (строка, как в keymaps)
#
#     hold:   что делает удержание, если `layer` не задан. Три варианта:
#               поле отсутствует  -> native: физическая клавиша
#                                    удерживается как есть (ShiftLeft
#                                    остаётся Shift-модификатором и т.д.)
#               hold: ~  (null)   -> swallow: удержание проглатывается
#               hold: <keystroke> -> удерживаем указанную комбинацию,
#                                    пока нажата физическая клавиша
#                                    (например, hold: ControlLeft ->
#                                    MetaLeft ведёт себя как Ctrl).
#             Если задан `layer`, поле `hold` игнорируется.
#
#     holdMs: индивидуальный таймаут удержания в мс. Опционально.
#             Если не указан, используется settings.defaultHoldTimeoutMs.
#
#     dtap / dtapMs: действие на двойное нажатие и окно распознавания
#             в мс. Оба поля опциональны.
#
#   Если все три поля (`layer`, `tap`, `hold`) не заданы и нет `dtap`,
#   правило полностью прозрачно и движком не регистрируется — клавиша
#   проходит в систему без изменений.
#
#   Interrupt-on-other-key-press: если во время ожидания решения
#   (hold-таймер ещё не истёк) пользователь нажимает другую клавишу,
#   текущее правило сразу коммитится как hold. Это обязательное
#   поведение — без него mod-tap (Shift+A, MetaLeft-hold=Ctrl+C и т.п.)
#   был бы непригоден.
#
# keymaps:
#   Карта «id_слоя -> раскладка». Для слоя "base" описывает базовые
#   переопределения; для кастомных слоёв — что делают клавиши, пока слой
#   активен.
#     keys:    { <код клавиши>: <действие> }  — маппинг основных клавиш.
#     extras:  массив дополнительных биндов (кнопки мыши, медиа-клавиши,
#              произвольные имена).
#       - name:   отображаемое имя
#         action: действие
#
# -----------------------------------------------------------------------------
# КОДЫ КЛАВИШ
# -----------------------------------------------------------------------------
# Буквы:      KeyA, KeyB, ..., KeyZ
# Цифры:      Digit0..Digit9
# F-ряд:      F1..F12
# Навигация:  Escape, Tab, CapsLock, Enter, Backspace, Space
# Знаки:      Backquote ` , Minus - , Equal = , BracketLeft [ ,
#             BracketRight ] , Backslash \ , Semicolon ; , Quote ' ,
#             Comma , , Period . , Slash /
# Модификаторы: ShiftLeft, ShiftRight, ControlLeft, ControlRight,
#               AltLeft, AltRight, MetaLeft, MetaRight, ContextMenu
#
# Действия (поле tap / значения в keys / extras.action) — свободные
# строки. Формат интерпретируется маппером в рантайме, например:
#   "Escape", "Left", "Ctrl+C", "BrowserBack", "macro:<id>",
#   "sys:<имяФункции>" — системная функция (см. ниже).
#
# -----------------------------------------------------------------------------
# СИСТЕМНЫЕ ФУНКЦИИ (sys:...)
# -----------------------------------------------------------------------------
# Кросс-платформенные действия с одинаковым именем, но разной реализацией
# под каждую ОС / окружение. Если функция не поддерживается на текущей
# машине — маппер логирует предупреждение и шаг пропускается.
#
# Поддерживается сейчас (Linux + KDE Plasma):
#   sys:switchDesktop1 .. sys:switchDesktop10
#     — переключение на виртуальный рабочий стол N
#       (qdbus org.kde.KWin /KWin setCurrentDesktop N).
#   sys:switchLayout1 .. sys:switchLayout10
#     — переключение на раскладку клавиатуры N
#       (qdbus org.kde.keyboard /Layouts org.kde.KeyboardLayouts.setLayout N-1).
#   sys:showClipboardHistory
#     — показать историю буфера обмена Klipper
#       (qdbus org.kde.plasmashell /klipper org.kde.klipper.klipper.showKlipperPopupMenu).
#   sys:volumeDown / sys:volumeUp / sys:muteAudio
#     — управление громкостью через глобальные действия Plasma.
#   sys:brightnessDown / sys:brightnessUp
#     — управление яркостью экрана через PowerDevil.
#   sys:windowClose
#     — закрыть активное окно через KWin.
#   sys:windowMaximizeVertical / sys:windowMaximizeHorizontal
#     — развернуть активное окно по вертикали / горизонтали через KWin.
#   sys:screenshot
#     — сделать скриншот области через Spectacle.
#   sys:screenOff
#     — выключить экран через PowerDevil.
#
# Использовать можно и напрямую (как tap / значение в keys / extras),
# и как шаг макроса.
#
# -----------------------------------------------------------------------------
# МАКРОСЫ
# -----------------------------------------------------------------------------
# macros:
#   Пользовательские макросы: последовательность нажатий клавиш, которая
#   выполняется целиком по триггеру. Каждый шаг — одно сочетание клавиш
#   (как "Ctrl+Shift+T" или "Enter"); шаги выполняются друг за другом —
#   предыдущее сочетание полностью отпускается, делается пауза и только
#   потом нажимается следующее.
#
#   - id:               уникальный идентификатор макроса (на него ссылаются
#                       действия вида "macro:<id>").
#     name:             человекочитаемое имя, показывается в UI.
#     stepPauseMs:      (опц.) пауза между шагами в мс; переопределяет
#                       settings.defaultMacroStepPauseMs.
#     modifierDelayMs:  (опц.) задержка в мс между нажатием модификатора
#                       и основной клавиши внутри одного шага; переопределяет
#                       settings.defaultMacroModifierDelayMs.
#     steps:            массив шагов. Каждый шаг — строка с сочетанием
#                       клавиш, например "Ctrl+C", "Escape", "Shift+End".
#
# Чтобы назначить макрос на клавишу — в tap / keys / extras.action укажите
# строку "macro:<id>" (например, "macro:copyLine").
#
# В будущем макросы также смогут вызывать консольные команды и специальные
# системные действия — пока не реализовано.
# =============================================================================

name: "Ivan K's left hand control"
description: >-
  Авторская раскладка Ивана К. Левая рука управляет навигацией (CapsLock → nav),
  символами (AltRight → sym) и оконным менеджером (AltLeft → win).
  Слои Selection / F keys / Space зарезервированы под дальнейшие биндинги.

layers:
  - id: nav
    name: Navigation
    description: >-
      Навигация по тексту и коду: стрелки, Home/End, PageUp/Down, переходы по
      словам и строкам. Активируется на удержании CapsLock.
  - id: sel
    name: Selection
    description: >-
      Выделение текста: выделение по символу / слову / строке, расширение
      выделения. Обычно используется вместе с Shift-модификаторами.
  - id: sym
    name: Symbols
    description: >-
      Символы и знаки препинания, которые неудобно набирать с левой руки в
      обычной раскладке (! @ # $ % ^ & * | ~ `).
  - id: fkeys
    name: F keys
    description: >-
      Функциональные клавиши F1–F24 для IDE, дебаггеров и системных биндов.
  - id: win
    name: Windows
    description: >-
      Оконный менеджер и виртуальные рабочие столы: переключение между
      десктопами, перемещение окон, тайлинг.
  - id: space
    name: Space
    description: >-
      Слой на пробеле: дополнительные действия без смены позиции рук на
      домашнем ряду.

rules:
  # Tab: короткое нажатие — native Tab, удержание — слой выделения.
  - key: Tab
    layer: sel

  # CapsLock: коротко — Ctrl+V (вставка), удержание — слой навигации.
  - key: CapsLock
    tap: Ctrl+V
    layer: nav
    holdMs: 180

  # ShiftLeft: удержание — native Shift (модификатор), тап — Ctrl+C.
  - key: ShiftLeft
    tap: Ctrl+C

  # ControlLeft: удержание — как системный AltLeft, короткое нажатие — native Ctrl.
  - key: ControlLeft
    hold: AltLeft

  # MetaLeft: удержание — как ControlLeft, тап — Escape.
  - key: MetaLeft
    tap: Escape
    hold: ControlLeft

  # AltLeft: удержание — слой оконного менеджера, тап — Enter.
  - key: AltLeft
    tap: Enter
    layer: win

  # Пробел: удержание — слой space, короткое нажатие — native Space.
  - key: Space
    layer: space

  # AltRight: удержание — слой символов, тап — ".".
  - key: AltRight
    tap: "."
    layer: sym

  # CtrlRight: удержание — слой F-клавиш, тап — ",".
  - key: ControlRight
    tap: ","
    layer: fkeys

  # ShiftRight: удержание — native Shift, тап — символ "_".
  - key: ShiftRight
    tap: "-"

keymaps:
  # Базовый слой: обычно пустой; сюда можно сразу положить глобальные
  # переопределения (например, поменять левый Ctrl <-> CapsLock).
  base:
    keys: {}
    extras: []

  nav:
    keys:
      KeyQ: macro:moveLineDown
      KeyW: Ctrl+Backspace
      KeyE: Ctrl+Delete
      KeyR: PageUp
      KeyT: Ctrl+Home
      KeyY: Home
      KeyU: macro:downEnd
      KeyI: macro:upEnd
      KeyO: End
      KeyP: macro:up5Times
      #BracketLeft
      #BracketRight
      #Backslash

      #KeyA: null
      KeyS: macro:duplicateLine
      KeyD: Ctrl+D
      KeyF: PageDown
      KeyG: Ctrl+End
      KeyH: Left
      KeyJ: Down
      KeyK: Up
      KeyL: Right
      Semicolon: macro:rightSpace
      #Quote:

      KeyZ: macro:emptyLineBelow
      KeyX: macro:cutWordRightCenter
      KeyC: macro:copyWordAfterCenter
      KeyV: macro:pasteAtLineAbove
      KeyB: macro:replaceWordWidthBuffer
      KeyN: Ctrl+Left
      KeyM: macro:downHome
      Comma: macro:upHome
      Period: Ctrl+Right
      Slash: macro:down5Times
    extras:
      - name: Mouse4
        action: BrowserBack
      - name: Mouse5
        action: BrowserForward

  sel:
    keys:
      KeyQ: Ctrl+Z
      KeyW: macro:cutToStart
      KeyE: macro:cutToEnd
      KeyR: macro:cutLineContent
      KeyT: macro:cutAndRemoveLine
      KeyY: Shift+Home
      #KeyU:
      #KeyI:
      KeyO: Shift+End
      KeyP: macro:select5LinesUp
      #BracketLeft
      #BracketRight
      #Backslash

      KeyA: Ctrl+Slash
      KeyS: macro:copyToStart
      KeyD: macro:copyToEnd
      KeyF: macro:copyLine
      #KeyG:
      KeyH: Shift+Left
      KeyJ: Shift+Down
      KeyK: Shift+Up
      KeyL: Shift+Right
      Semicolon: macro:selectWholeLine
      #Quote:

      #KeyZ:
      KeyX: macro:replaceToStartWithBuffer
      KeyC: macro:replaceToEndWithBuffer
      #KeyV:
      KeyB: macro:replaceLineWidthBuffer
      KeyN: Shift+Ctrl+Left
      #KeyM:
      #Comma:
      Period: Shift+Ctrl+Right
      Slash: macro:select5LinesDown

  sym:
    keys:
      KeyQ: "<"
      KeyW: "{"
      KeyE: "["
      KeyR: "("
      KeyT: "|"
      KeyY: "^"
      KeyU: "7"
      KeyI: "8"
      KeyO: "9"
      KeyP: "="
      BracketLeft: "≠"
      #BracketRight
      #Backslash

      KeyA: "$"
      KeyS: "#"
      KeyD: "!"
      KeyF: "?"
      KeyG: "&"
      KeyH: "*"
      KeyJ: "4"
      KeyK: "5"
      KeyL: "6"
      Semicolon: "+"
      Quote: "%"

      KeyZ: ":"
      KeyX: "`"
      KeyC: "'"
      KeyV: '"'
      KeyB: "/"
      KeyN: "0"
      KeyM: "1"
      Comma: "2"
      Period: "3"
      Slash: "@"

  fkeys:
    keys:
      KeyQ: ">"
      KeyW: "}"
      KeyE: "]"
      KeyR: ")"
      #KeyT: ""
      #KeyY:
      KeyU: F7
      KeyI: F8
      KeyO: F9
      KeyP: F12
      BracketLeft: "ℹ️"
      #BracketRight
      #Backslash

      KeyA: "€"
      KeyS: "№"
      KeyD: "‼️"
      KeyF: "❓"
      KeyG: "❌"
      #KeyH: ""
      KeyJ: F4
      KeyK: F5
      KeyL: F6
      Semicolon: F11
      Quote: "☝️"

      KeyZ: ";"
      KeyX: "~"
      KeyC: "⏩"
      KeyV: "✅"
      KeyB: "\\"
      #KeyN:
      KeyM: F1
      Comma: F2
      Period: F3
      Slash: F10

  win:
    keys:
      #KeyQ:
      KeyW: Ctrl+A
      #KeyE:
      #KeyR:
      #KeyT:
      #KeyY:
      #KeyU:
      #KeyI:
      #KeyO:
      #KeyP:
      #BracketLeft:
      #BracketRight
      #Backslash: sys:screenOff

      KeyA: sys:switchDesktop4
      KeyS: sys:switchDesktop3
      KeyD: sys:switchDesktop2
      KeyF: sys:switchDesktop1
      #KeyG: sys:switchLayout1
      #KeyH: sys:switchLayout2
      #KeyJ:
      #KeyK:
      #KeyL:
      #Semicolon:
      #Quote:

      KeyZ: sys:windowMaximizeVertical
      KeyX: sys:windowMaximizeHorizontal
      KeyC: sys:screenshot
      KeyV: sys:showClipboardHistory
      KeyB: sys:windowClose
      KeyN: sys:brightnessDown
      KeyM: sys:brightnessUp
      Comma: sys:volumeDown
      Period: sys:volumeUp
      Slash: sys:muteAudio

  space:
    keys:
      Tab: sys:switchLayout1
      CapsLock: sys:switchLayout2
      ShiftLeft: sys:switchLayout3
    #extras: []

# Макросы, используемые этой раскладкой, вынесены в системные (их
# определяет приложение и они доступны из любой раскладки без объявления
# здесь). Каталог системных макросов — `utils/systemMacros.ts` (и
# зеркальный `src-tauri/src/mapper/system_macros.rs`).
#
# Если раскладке нужен свой, специфичный для неё макрос — его можно
# описать ниже в блоке `macros:`. Пользовательский макрос с тем же id
# что и системный полностью перекрывает системный.
#
# Пример (раскомментируйте и подставьте как tap / в keys.<Key>):
#
# macros:
#   - id: copyLine
#     name: "Скопировать строку"
#     stepPauseMs: 25
#     modifierDelayMs: 10
#     steps:
#       - Home
#       - Shift+End
#       - Ctrl+C
#       - End
#
#   - id: saveAll
#     name: "Save All"
#     steps:
#       - Ctrl+Shift+S

macros: []
