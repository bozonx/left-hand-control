# Left Hand Control — стартовая конфигурация слоёв.
#
# Этот файл читается при первом запуске приложения, когда ещё нет
# ~/.config/LeftHandControl/config.json. После первого запуска вся
# правда живёт в config.json (app пишет его автосейвом), и этот YAML
# больше не читается — он служит только шаблоном «из коробки».
#
# Чтобы снова применить изменения из этого файла — удалите
# ~/.config/LeftHandControl/config.json и перезапустите приложение.
#
# -----------------------------------------------------------------------------
# СТРУКТУРА
# -----------------------------------------------------------------------------
#
# settings:
#   defaultHoldTimeoutMs:          int, мс — сколько нужно держать клавишу, чтобы
#                                  она считалась «hold» (активировала слой), а не
#                                  «tap» (одиночное нажатие → tap action).
#   defaultMacroStepPauseMs:       int, мс — пауза между шагами (сочетаниями)
#                                  макроса по умолчанию.
#   defaultMacroModifierDelayMs:   int, мс — задержка после нажатия модификатора
#                                  (Shift/Ctrl/...) перед нажатием основной
#                                  клавиши в одном шаге макроса.
#   launchOnStartup:               bool — автозапуск вместе с системой
#                                  (пока не реализован, значение сохраняется).
#
# layers:
#   Список пользовательских слоёв. Базовый слой "base" всегда существует
#   и добавляется автоматически, описывать его здесь не нужно.
#   - id:   уникальный идентификатор (латиница, без пробелов).
#     name: человекочитаемое имя, которое будет показано в UI.
#
# rules:
#   Правила для модификаторов-слоёв: на какую клавишу навесить активацию
#   слоя и/или действие одиночного нажатия.
#   - key:    код физической клавиши (см. список ниже).
#     layer:  id слоя, активируемого при удержании. Опционально.
#             Пусто / null = слой не активируется (только tap).
#     tap:    действие при коротком нажатии. Опционально.
#     holdMs: индивидуальный таймаут удержания в мс. Опционально.
#             Если не указан, используется settings.defaultHoldTimeoutMs.
#
# keymaps:
#   Карта «id_слоя -> раскладка». Для слоя "base" описывает базовые
#   переопределения; для кастомных слоёв — что делают клавиши, пока слой
#   активен.
#     keys:    { <код клавиши>: <действие> }  — маппинг основных клавиш.
#     extras:  массив дополнительных биндов (кнопки мыши, медиа-клавиши,
#              произвольные имена).
#       - name:   отображаемое имя
#         action: действие
#
# -----------------------------------------------------------------------------
# КОДЫ КЛАВИШ
# -----------------------------------------------------------------------------
# Буквы:      KeyA, KeyB, ..., KeyZ
# Цифры:      Digit0..Digit9
# F-ряд:      F1..F12
# Навигация:  Escape, Tab, CapsLock, Enter, Backspace, Space
# Знаки:      Backquote ` , Minus - , Equal = , BracketLeft [ ,
#             BracketRight ] , Backslash \ , Semicolon ; , Quote ' ,
#             Comma , , Period . , Slash /
# Модификаторы: ShiftLeft, ShiftRight, ControlLeft, ControlRight,
#               AltLeft, AltRight, MetaLeft, MetaRight, ContextMenu
#
# Действия (поле tap / значения в keys / extras.action) — свободные
# строки. Формат интерпретируется маппером в рантайме, например:
#   "Escape", "Left", "Ctrl+C", "BrowserBack", "macro:<id>",
#   "sys:<имяФункции>" — системная функция (см. ниже).
#
# -----------------------------------------------------------------------------
# СИСТЕМНЫЕ ФУНКЦИИ (sys:...)
# -----------------------------------------------------------------------------
# Кросс-платформенные действия с одинаковым именем, но разной реализацией
# под каждую ОС / окружение. Если функция не поддерживается на текущей
# машине — маппер логирует предупреждение и шаг пропускается.
#
# Поддерживается сейчас (Linux + KDE Plasma):
#   sys:switchDesktop1 .. sys:switchDesktop10
#     — переключение на виртуальный рабочий стол N
#       (qdbus org.kde.KWin /KWin setCurrentDesktop N).
#
# Использовать можно и напрямую (как tap / значение в keys / extras),
# и как шаг макроса.
#
# -----------------------------------------------------------------------------
# МАКРОСЫ
# -----------------------------------------------------------------------------
# macros:
#   Пользовательские макросы: последовательность нажатий клавиш, которая
#   выполняется целиком по триггеру. Каждый шаг — одно сочетание клавиш
#   (как "Ctrl+Shift+T" или "Enter"); шаги выполняются друг за другом —
#   предыдущее сочетание полностью отпускается, делается пауза и только
#   потом нажимается следующее.
#
#   - id:               уникальный идентификатор макроса (на него ссылаются
#                       действия вида "macro:<id>").
#     name:             человекочитаемое имя, показывается в UI.
#     stepPauseMs:      (опц.) пауза между шагами в мс; переопределяет
#                       settings.defaultMacroStepPauseMs.
#     modifierDelayMs:  (опц.) задержка в мс между нажатием модификатора
#                       и основной клавиши внутри одного шага; переопределяет
#                       settings.defaultMacroModifierDelayMs.
#     steps:            массив шагов. Каждый шаг — строка с сочетанием
#                       клавиш, например "Ctrl+C", "Escape", "Shift+End".
#
# Чтобы назначить макрос на клавишу — в tap / keys / extras.action укажите
# строку "macro:<id>" (например, "macro:copyLine").
#
# В будущем макросы также смогут вызывать консольные команды и специальные
# системные действия — пока не реализовано.
# =============================================================================

settings:
  defaultHoldTimeoutMs: 200
  defaultMacroStepPauseMs: 20
  defaultMacroModifierDelayMs: 5
  launchOnStartup: false

layers:
  - id: nav
    name: Navigation
    description: >-
      Навигация по тексту и коду: стрелки, Home/End, PageUp/Down, переходы по
      словам и строкам. Активируется на удержании CapsLock.
  - id: sel
    name: Selection
    description: >-
      Выделение текста: выделение по символу / слову / строке, расширение
      выделения. Обычно используется вместе с Shift-модификаторами.
  - id: sym
    name: Symbols
    description: >-
      Символы и знаки препинания, которые неудобно набирать с левой руки в
      обычной раскладке (! @ # $ % ^ & * | ~ `).
  - id: fkeys
    name: F keys
    description: >-
      Функциональные клавиши F1–F24 для IDE, дебаггеров и системных биндов.
  - id: win
    name: Windows
    description: >-
      Оконный менеджер и виртуальные рабочие столы: переключение между
      десктопами, перемещение окон, тайлинг.
  - id: space
    name: Space
    description: >-
      Слой на пробеле: дополнительные действия без смены позиции рук на
      домашнем ряду.

rules:
  # CapsLock: коротко — Escape, удержание — слой навигации.
  - key: CapsLock
    layer: nav
    tap: Escape
    holdMs: 180

  # # Пробел: коротко — обычный Space, удержание — слой символов.
  # - key: Space
  #   layer: sym
  #   tap: Space

  # Правый Alt — только слой Symbols, без tap action.
  - key: AltRight
    layer: sym

  - key: AltLeft
    layer: win
 
keymaps:
  # Базовый слой: обычно пустой; сюда можно сразу положить глобальные
  # переопределения (например, поменять левый Ctrl <-> CapsLock).
  base:
    keys: {}
    extras: []

  nav:
    keys:
      KeyQ: macro:moveLineDown
      KeyW: macro:ctrlBackspace
      KeyE: macro:ctrlDelete
      KeyR: PageUp
      KeyT: macro:ctrlHome
      KeyY: Home
      KeyU: macro:downEnd
      KeyI: macro:upEnd
      KeyO: End
      KeyP: macro:up5Times
      #BracketLeft
      #BracketRight
      #Backslash

      #KeyA: null
      KeyS: macro:duplicateLine
      KeyD: macro:ctrlD
      KeyF: PageDown
      KeyG: macro:ctrlEnd
      KeyH: Left
      KeyJ: Down
      KeyK: Up
      KeyL: Right
      Semicolon: macro:rightSpace
      #Quote:

      KeyZ: macro:emptyLineBelow
      KeyX: macro:cutWordRightCenter
      KeyC: macro:copyWordAfterCenter
      KeyV: macro:pasteAtLineAbove
      KeyB: macro:replaceWordWidthBuffer
      KeyN: macro:ctrlLeft
      KeyM: macro:downHome
      Comma: macro:upHome
      Period: macro:ctrlRight
      Slash: macro:down5Times
    extras:
      - name: Mouse4
        action: BrowserBack
      - name: Mouse5
        action: BrowserForward

  sym:
    keys:
      KeyA: "!"
      KeyS: F24
      KeyD: "#"
      KeyF: "$"
      KeyG: "%"
      KeyH: "^"
      KeyJ: "&"
      KeyK: "*"
      KeyL: "|"
      KeyQ: "~"
      KeyW: "`"

  # sel:
  #   keys:
  #     KeyM: "1"
  #     Comma: "2"
  #     Period: "3"
  #     KeyJ: "4"
  #     KeyK: "5"
  #     KeyL: "6"
  #     KeyU: "7"
  #     KeyI: "8"
  #     KeyO: "9"
  #     Space: "0"
  #   extras: []
  
  win:
    keys:
      KeyF: sys:switchDesktop1
      KeyD: sys:switchDesktop2
      KeyS: sys:switchDesktop3
      KeyA: sys:switchDesktop4

macros:
  - id: moveLineDown
    name: "Move line down"
    steps:
      - Home
      - Enter
      - Up
  - id: ctrlBackspace
    name: "Ctrl + Backspace"
    steps:
      - Ctrl+Backspace
  - id: ctrlDelete
    name: "Ctrl + Delete"
    steps:
      - Ctrl+Delete
  - id: ctrlHome
    name: "Ctrl + Home"
    steps:
      - Ctrl+Home
  - id: downEnd
    name: "Down + End"
    steps:
      - Down
      - End
  - id: upEnd
    name: "Up + End"
    steps:
      - Up
      - End
  - id: up5Times
    name: "Up 5 times"
    steps:
      - Up
      - Up
      - Up
      - Up
      - Up
  
  - id: duplicateLine
    name: "Duplicate line"
    steps:
      - End
      - Shift+Home
      - Ctrl+C
      - End
      - Enter
      - Ctrl+V
  - id: ctrlD
    name: "Ctrl + d"
    steps:
      - Ctrl+KeyD
  - id: ctrlEnd
    name: "Ctrl + End"
    steps:
      - Ctrl+End
  - id: rightSpace
    name: "Right + Space"
    steps:
      - Right
      - Space
  
  - id: emptyLineBelow
    name: "Empty line below"
    steps:
      - End
      - Enter
  - id: cutWordRightCenter
    name: "Cut word right from center"
    steps:
      - Ctrl+Right
      - Ctrl+Shift+Left
      - Ctrl+X
  - id: copyWordAfterCenter
    name: "Copy word right from center"
    steps:
      - Ctrl+Right
      - Ctrl+Shift+Left
      - Ctrl+C
      - Left
  - id: pasteAtLineAbove
    name: "Paste at line above"
    steps:
      - Home
      - Enter
      - UP
      - Ctrl+V
  - id: replaceWordWidthBuffer
    name: "Replace word width buffer"
    steps:
      - Ctrl+Right
      - Ctrl+Shift+Left
      - Ctrl+C
  - id: ctrlLeft
    name: "Ctrl + Left"
    steps:
      - Ctrl+Left
  - id: downHome
    name: "Down + Home"
    steps:
      - Down
      - Home
  - id: upHome
    name: "Up + Home"
    steps:
      - Up
      - Home
  - id: ctrlRight
    name: "Ctrl + Right"
    steps:
      - Ctrl+Right
  - id: down5Times
    name: "Down 5 times"
    steps:
      - Down
      - Down
      - Down
      - Down
      - Down
  - id: toDesktop1
    name: "To Desktop 1"
    steps:
      - sys:switchDesktop1

# Пример макросов (раскомментируйте и подставьте как tap / в keys.<Key>):
#
